<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Flying Bird</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #1e88e5;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #game-wrapper {
      width: min(100vw, 430px);
      height: min(100vh, 760px);
      aspect-ratio: 9 / 16;
      background: #000;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }
  </style>
</head>

<body>
  <div id="game-wrapper">
    <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>
  </div>

  <script src="Build/FlappyBird WebGL.loader.js"></script>
  <script>
    createUnityInstance(document.querySelector("#unity-canvas"), {
      dataUrl: "Build/FlappyBird WebGL.data",
      frameworkUrl: "Build/FlappyBird WebGL.framework.js",
      codeUrl: "Build/FlappyBird WebGL.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "Flying Bird",
      productVersion: "1.0",
    });
  </script>
</body>
</html>
